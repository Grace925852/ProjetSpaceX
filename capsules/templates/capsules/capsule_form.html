<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% if object %}Modifier{% else %}Ajouter{% endif %} une Capsule</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .form-container p { margin-bottom: 15px; }
        .form-container input, .form-container select { 
            display: block;
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
        }
    </style>
</head>
<body class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-warning text-dark">
            <h2 class="mb-0">
                {% if object %} Modifier la Capsule : {{ object.serial }} {% else %} Ajouter une Nouvelle Capsule {% endif %}
            </h2>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="form-container">
                    {# Cette ligne génère automatiquement le statut, serial, type, last_update ET missions_count #}
                    {{ form.as_p }}
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success">Enregistrer les modifications</button>
                    <a href="{% url 'capsule_list' %}" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
